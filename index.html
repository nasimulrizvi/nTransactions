function parseSmsText(sms){
  if(!sms)return null;
  const t={type:null,amount:null,wallet:null,note:sms.slice(0,80),date:todayDT()};

  // ---- Amount detection ----
  const amtMatch=sms.match(/(?:BDT|Tk\.?|TK\.?|৳|BDT\.?)\s*([\d,]+\.?\d*)/i)
    ||sms.match(/([\d,]+\.?\d*)\s*(?:BDT|Tk\.?|TK\.?|taka)/i)
    ||sms.match(/(?:amount|amt|paid|received|sent|transferred|deducted)[^\d]*([\d,]+\.?\d*)/i);
  if(amtMatch)t.amount=parseFloat(amtMatch[1].replace(/,/g,''));

  // ---- Type detection ----
  const lc=sms.toLowerCase();
  const cashInKw=['received','credited','cash in','deposit','incoming','added','paid to you','you got'];
  const expKw=['debited','payment','paid','purchase','withdrawal','cash out','sent','deducted','spent','charged','bill','recharge'];
  const trfKw=['transferred to','send money to','transfer to','sent to'];
  if(trfKw.some(k=>lc.includes(k)))t.type='transfer';
  else if(cashInKw.some(k=>lc.includes(k)))t.type='income';
  else if(expKw.some(k=>lc.includes(k)))t.type='expense';
  else t.type='expense'; // default

  // ---- Wallet detection (match against existing wallets by name) ----
  for(const w of S.wallets){
    if(lc.includes(w.name.toLowerCase())){t.wallet=w.id;break;}
  }
  // common MFS/bank keywords if wallet not found by name
  if(!t.wallet){
    const kwMap={'bkash':'bKash','nagad':'Nagad','rocket':'Rocket','upay':'Upay','dbbl':'DBBL','dutch':'DBBL','islami':'Islami Bank','city':'City Bank','dutch-bangla':'DBBL'};
    for(const [kw,name] of Object.entries(kwMap)){
      if(lc.includes(kw)){const wMatch=S.wallets.find(w=>w.name.toLowerCase().includes(name.toLowerCase()));if(wMatch){t.wallet=wMatch.id;break;}}
    }
  }

  // ---- Date/time from SMS ----
  const dtMatch=sms.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})[,\s]+(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM|am|pm)?/);
  if(dtMatch){
    const[,d,m,y,h,min,,ampm]=dtMatch;
    const yr=y.length===2?'20'+y:y;
    let hr=parseInt(h);
    if(ampm&&ampm.toLowerCase()==='pm'&&hr<12)hr+=12;
    if(ampm&&ampm.toLowerCase()==='am'&&hr===12)hr=0;
    t.date=`${yr}-${m.padStart(2,'0')}-${d.padStart(2,'0')}T${String(hr).padStart(2,'0')}:${min}`;
  }
  return t;
}
function parseSmsAndPreview(){
  const sms=document.getElementById('sms-input').value.trim();
  if(!sms){alert('Please paste an SMS first.');return;}
  const parsed=parseSmsText(sms);
  if(!parsed||!parsed.amount){
    document.getElementById('sms-result').innerHTML=`<div style="background:var(--red-d);border:1px solid rgba(255,61,90,.25);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--red);">Could not detect amount from SMS. Please add the transaction manually.</div>`;

  const allWOpts=S.wallets.map(w=>`<option value="${w.id}">${w.name}</option>`).join('');
  const isTransfer=parsed.type==='transfer';

  const catField=!isTransfer?`<div class="fg"><label class="fl">Category</label><select class="fi" id="sp-cat"><option value="">-- Select category --</option>${txCatOpts(catType).replace('<option value="">Select a category</option>','')}</select></div>`:'';
  const walletField=isTransfer

       <div class="fg"><label class="fl">To Wallet</label><select class="fi" id="sp-wlt2">${allWOpts}</select></div>`
    :`<div class="fg"><label class="fl">Wallet</label><select class="fi" id="sp-wlt">${wOpts}</select></div>`;
  document.getElementById('sms-result').innerHTML=`
    <div style="background:var(--bg3);border:1px solid var(--green);border-radius:12px;padding:14px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">Parsed Result — Review & Confirm</div>
      <div class="fg"><label class="fl">Type</label><select class="fi" id="sp-type" onchange="refreshSmsParserFields()"><option value="expense" ${parsed.type==='expense'?'selected':''}>Expense</option><option value="income" ${parsed.type==='income'?'selected':''}>Cash In</option><option value="transfer" ${parsed.type==='transfer'?'selected':''}>Transfer</option></select></div>
      <div id="sp-wallet-fields">${walletField}</div>
      <div class="fg"><label class="fl">Date & Time</label><input type="datetime-local" class="fi" id="sp-dt" value="${parsed.date}"></div>
      <div class="fg"><label class="fl">Amount (৳)</label><div class="amt-wrap"><span class="amt-pre">৳</span><input type="number" class="fi amt-fi" id="sp-amt" value="${parsed.amount}" min="0" step="0.01"></div></div>
      <div id="sp-cat-field">${catField}</div>
      <div class="fg"><label class="fl">Note (from SMS)</label><input type="text" class="fi" id="sp-note" value="${parsed.note}"></div>
      <button class="btn btn-p" onclick="submitSmsTransaction()" style="margin-top:4px;">Add Transaction</button>
    </div>`;

function submitSmsTransaction(){
  const type=document.getElementById('sp-type').value;
  const amt=parseFloat(document.getElementById('sp-amt').value);
  const wid=document.getElementById('sp-wlt').value;
  const dt=document.getElementById('sp-dt').value;
  const note=document.getElementById('sp-note').value.trim();
  const catEl=document.getElementById('sp-cat');
  const cat=catEl?catEl.value:'';
  if(!amt||amt<=0)return alert('Enter a valid amount.');
  if(!wid)return alert('Select a wallet.');
  const tx={id:uid(),type,category:cat||'',amount:amt,wallet:wid,date:dt||todayDT(),note,photo:'',at:new Date().toISOString()};
  if(type==='transfer'){
    const wid2El=document.getElementById('sp-wlt2');
    const wid2=wid2El?wid2El.value:'';
    if(!wid2)return alert('Select To Wallet.');
    if(wid===wid2)return alert('From and To wallet cannot be the same.');
    tx.toWallet=wid2;
    const fw=S.wallets.find(x=>x.id===wid);
    const tw=S.wallets.find(x=>x.id===wid2);
    if(fw)fw.balance-=amt;
    if(tw)tw.balance+=amt;
  } else {
    const fw=S.wallets.find(x=>x.id===wid);
    if(type==='expense'&&fw)fw.balance-=amt;
    else if(type==='income'&&fw)fw.balance+=amt;
  }
  S.transactions.unshift(tx);save();closeModal();renderMain();
}
function openImportInfo(){
  openModal(`<div class="modal-title">Backup & Sync</div>
  <div style="background:var(--green-d);border:1px solid rgba(12,233,127,.25);border-radius:12px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    <div style="font-size:13px;color:var(--green);font-weight:600;">Real-time sync is active</div>
  </div>
  <div style="font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:14px;">Your data is automatically synced to Firebase in real-time. Any changes made on one device will instantly appear on all other signed-in devices.</div>
  <div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 14px;font-size:12px;color:var(--text3);line-height:1.7;">
    <b style="color:var(--text2);">Tip:</b> Use Export to Excel from Settings to keep a local backup of your transaction history at any time.
  </div>
  <button class="btn btn-s" onclick="openSyncModal()" style="margin-top:14px;">Back</button>`);
}

// ============ SMS PENDING (Firebase listener) ============
let _smsPendingListener=null;
let _smsPending=[];

function startSmsPendingListener(){
  if(!fbUser)return;
  if(_smsPendingListener)return;
  // Path matches Android app: /users/{uid}/sms_pending/
  const ref=fbDb.ref('users/'+fbUser.uid+'/sms_pending');
  _smsPendingListener=ref.on('value',snap=>{
    const data=snap.val();
    _smsPending=data?Object.entries(data)
      .map(([k,v])=>({_key:k,...v}))
      .sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))
      :[];
    updateSmsBadge();
  });
}
function stopSmsPendingListener(){
  if(_smsPendingListener&&fbUser){
    fbDb.ref('users/'+fbUser.uid+'/sms_pending').off('value',_smsPendingListener);
    _smsPendingListener=null;
  }
}
function updateSmsBadge(){
  const btn=document.getElementById('sms-pending-btn');
  const badge=document.getElementById('sms-badge');
  if(!btn||!badge)return;
  const n=_smsPending.length;
  btn.style.display=n>0?'':'none';
  badge.textContent=n>9?'9+':n;
}
function openSmsPending(){
  if(!_smsPending.length){updateSmsBadge();return;}
  const idx=0; // show first pending
  showSmsReview(idx);
}
function showSmsReview(idx){
  if(idx>=_smsPending.length){closeModal();return;}
  const p=_smsPending[idx];
  const remaining=_smsPending.length-idx;
  const pType=(p.type||'').toLowerCase();
  const isTransfer=pType==='transfer';
  const isIncome=pType==='income'||pType==='cash in';

  const wOpts=S.wallets.map(w=>`<option value="${w.id}" ${(w.name===p.wallet||w.id===p.wallet)?'selected':''}>${w.name}</option>`).join('');
  const allWOpts=S.wallets.map(w=>`<option value="${w.id}">${w.name}</option>`).join('');

  const typeOpts=['expense','income','transfer'].map(tp=>{
    const match=(tp==='expense'&&pType==='expense')||(tp==='income'&&(pType==='income'||pType==='cash in'))||(tp==='transfer'&&pType==='transfer');
    return`<option value="${tp}" ${match?'selected':''}>${tp==='expense'?'Expense':tp==='income'?'Cash In':'Transfer'}</option>`;
  }).join('');

  let dtVal='';
  if(p.date&&p.time)dtVal=p.date+'T'+p.time;
  else if(p.datetime)dtVal=p.datetime.slice(0,16);
  else dtVal=todayDT();

  const balHtml=p.balance?`<span style="color:var(--text3);">Balance: <b style="color:var(--text);">${fmt(p.balance)}</b></span>`:'';
  const txnHtml=p.txnId?`<span style="color:var(--text3);">TxnID: <b style="color:var(--text);">${p.txnId}</b></span>`:'';

  // Wallet fields rendered based on current type
  function buildWalletFields(isTrf){
    return isTrf
      ?`<div class="fg"><label class="fl">From Wallet</label><select class="fi" id="sms-wallet">${wOpts}</select></div><div class="fg"><label class="fl">To Wallet</label><select class="fi" id="sms-wallet2">${allWOpts}</select></div>`
      :`<div class="fg"><label class="fl">Wallet</label><select class="fi" id="sms-wallet">${wOpts}</select></div>`;
  }
  function buildCatField(isTrf,isInc){
    if(isTrf)return'';
    return`<div class="fg"><label class="fl">Category <span style="color:var(--text3);font-weight:400;">(edit later)</span></label><select class="fi" id="sms-cat"><option value="">-- Select category --</option>${txCatOpts(isInc?'income':'expense').replace('<option value="">Select a category</option>','')}</select></div>`;
  }

  openModal(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div class="modal-title" style="margin:0;">Review SMS Transaction</div>
    <div style="font-size:11px;color:var(--amber);font-weight:700;background:var(--amber-d);padding:3px 9px;border-radius:7px;">${remaining} pending</div>
  </div>
  <div style="background:var(--amber-d);border:1px solid rgba(255,176,32,.25);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:var(--amber);line-height:1.9;display:flex;flex-direction:column;gap:2px;">
    <span style="font-weight:700;">Auto-detected from SMS</span>
    <span style="color:var(--text3);">Sender: <b style="color:var(--text);">${p.wallet||'Unknown'}</b></span>
    ${balHtml}${txnHtml?txnHtml:''}
  </div>
  <div class="fg"><label class="fl">Type</label><select class="fi" id="sms-type" onchange="smsTypeChanged(${idx})">${typeOpts}</select></div>
  <div id="sms-wallet-fields">${buildWalletFields(isTransfer)}</div>
  <div class="fg"><label class="fl">Date & Time</label><input type="datetime-local" class="fi" id="sms-dt" value="${dtVal}"></div>
  <div class="fg"><label class="fl">Amount</label><div class="amt-wrap"><span class="amt-pre">৳</span><input type="number" class="fi amt-fi" id="sms-amt" value="${p.amount||''}" min="0" step="0.01"></div></div>
  <div id="sms-cat-field">${buildCatField(isTransfer,isIncome)}</div>
  <div class="fg"><label class="fl">Description / Note</label><input type="text" class="fi" id="sms-note" value="${p.description||''}" placeholder="Auto-filled from SMS"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;">
    <button class="btn btn-p" onclick="confirmSmsTx(${idx})" style="margin:0;">Confirm & Save</button>
    <button class="btn btn-d" onclick="discardSmsTx(${idx})" style="margin:0;">Discard</button>
  </div>
  ${remaining>1?`<button class="btn btn-s" onclick="showSmsReview(${idx+1})" style="margin-top:8px;">Skip → Next (${remaining-1} more)</button>`:''}
  <button class="btn btn-s" onclick="closeModal()" style="margin-top:8px;font-size:14px;padding:12px;">Close</button>`);
}
function smsTypeChanged(idx){
  const type=document.getElementById('sms-type').value;
  const isTrf=type==='transfer';
  const isInc=type==='income';
  const p=_smsPending[idx]||{};
  const wOpts=S.wallets.map(w=>`<option value="${w.id}" ${(w.name===p.wallet||w.id===p.wallet)?'selected':''}>${w.name}</option>`).join('');
  const allWOpts=S.wallets.map(w=>`<option value="${w.id}">${w.name}</option>`).join('');
  const wf=document.getElementById('sms-wallet-fields');
  const cf=document.getElementById('sms-cat-field');
  if(wf)wf.innerHTML=isTrf
    ?`<div class="fg"><label class="fl">From Wallet</label><select class="fi" id="sms-wallet">${wOpts}</select></div><div class="fg"><label class="fl">To Wallet</label><select class="fi" id="sms-wallet2">${allWOpts}</select></div>`
    :`<div class="fg"><label class="fl">Wallet</label><select class="fi" id="sms-wallet">${wOpts}</select></div>`;
  if(cf)cf.innerHTML=isTrf?'':`<div class="fg"><label class="fl">Category <span style="color:var(--text3);font-weight:400;">(edit later)</span></label><select class="fi" id="sms-cat"><option value="">-- Select category --</option>${txCatOpts(isInc?'income':'expense').replace('<option value="">Select a category</option>','')}</select></div>`;
}
async function confirmSmsTx(idx){
  const p=_smsPending[idx];if(!p)return;
  let type=document.getElementById('sms-type').value;
  if(type==='Cash In')type='income';
  if(type==='Expense')type='expense';
  if(type==='Transfer')type='transfer';
  const wId=document.getElementById('sms-wallet').value;
  const amt=parseFloat(document.getElementById('sms-amt').value);
  const dt=document.getElementById('sms-dt').value||todayDT();
  const note=document.getElementById('sms-note').value.trim();
  const catEl=document.getElementById('sms-cat');
  const cat=catEl?catEl.value:'';
  if(!amt||amt<=0)return alert('Enter a valid amount.');
  if(!wId)return alert('Select a wallet.');
  const tx={id:uid(),type,category:cat||'',amount:amt,wallet:wId,date:dt,note,at:new Date().toISOString(),fromSms:true};
  if(type==='transfer'){
    const wId2El=document.getElementById('sms-wallet2');
    const wId2=wId2El?wId2El.value:'';
    if(!wId2)return alert('Select To Wallet.');
    if(wId===wId2)return alert('From and To wallet cannot be the same.');
    tx.toWallet=wId2;
    const fw=S.wallets.find(x=>x.id===wId);
    const tw=S.wallets.find(x=>x.id===wId2);
    if(fw)fw.balance-=amt;
    if(tw)tw.balance+=amt;
  } else {
    const w=S.wallets.find(x=>x.id===wId);
    if(w){if(type==='expense')w.balance-=amt;else if(type==='income')w.balance+=amt;}
  }
  S.transactions.unshift(tx);save();
  try{await fbDb.ref('users/'+fbUser.uid+'/sms_pending/'+p._key).remove();}catch(e){}
  _smsPending.splice(idx,1);
  updateSmsBadge();
  if(_smsPending.length>idx)showSmsReview(idx);
  else{closeModal();renderMain();}
}
async function discardSmsTx(idx){
  const p=_smsPending[idx];if(!p)return;
  if(!confirm('Discard this SMS transaction?'))return;
  try{await fbDb.ref('users/'+fbUser.uid+'/sms_pending/'+p._key).remove();}catch(e){}
  _smsPending.splice(idx,1);
  updateSmsBadge();
  if(_smsPending.length>idx)showSmsReview(idx);
  else closeModal();
}

// ============ NOTE AUTOCOMPLETE ============
function showNoteSugg(input, txType){
  const q=input.value.trim().toLowerCase();
  const sugg=document.getElementById('note-sugg');
  if(!sugg)return;
  if(!q){sugg.style.display='none';return;}
  // collect unique notes from same tx type
  const notes=[...new Set(
    S.transactions
      .filter(t=>t.type===txType&&t.note&&t.note.toLowerCase().includes(q))
      .sort((a,b)=>b.date.localeCompare(a.date))
      .map(t=>t.note)
  )].slice(0,6);
  if(!notes.length){sugg.style.display='none';return;}
  sugg.innerHTML=notes.map(n=>`<div onclick="pickNoteSugg('${n.replace(/'/g,"\\'")}','${txType}')" style="padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--borderl);color:var(--text);" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background=''">${n}</div>`).join('');
  sugg.style.display='block';
  // close on outside click
  setTimeout(()=>{
    const close=e=>{if(!sugg.contains(e.target)&&e.target!==input){sugg.style.display='none';document.removeEventListener('click',close);}};
    document.addEventListener('click',close);
  },10);
}
function pickNoteSugg(note,txType){
  const inp=document.getElementById('tx-note');
  const sugg=document.getElementById('note-sugg');
  if(inp)inp.value=note;
  if(sugg)sugg.style.display='none';
}

// ============ INIT ============
load();
loadSavedTheme();
go('dashboard');
initAuth();
updateHeaderAvatar();
_initSwipe();
</script>
