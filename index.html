    async function doSignUp() {
      if (!validateAuth('up', true)) return;
      const { name, email, pass } = authValues();
      clearAuthMessage();
      setAuthLoading(true, 'Creating account...');
      _authEmailFlowActive = true;
      try {
        const cred = await fbAuth.createUserWithEmailAndPassword(email, pass);
        let toastMsg = 'Account created successfully';
        if (cred.user) {
          await cred.user.updateProfile({ displayName: name });
          await saveAuthProfile(cred.user, { fullName: name, provider: 'password' });
          try {
            await cred.user.sendEmailVerification();
            toastMsg = 'Account created successfully. Verification email sent.';
          } catch (mailErr) {
            toastMsg = 'Account created successfully';
            setAuthMessage('Account created, but the verification email could not be sent right now.', 'info');
          }
          await fbDb.ref('users/' + cred.user.uid + '/profile/createdAt').set(firebase.database.ServerValue.TIMESTAMP).catch(() => { });
        }
        await fbAuth.signOut();
        fbUser = null;
        setSyncDot('');
        returnHomeAfterAuth(toastMsg);
      } catch (e) {
        setAuthMessage(authErrorMessage(e), 'error');
      } finally {
        _authEmailFlowActive = false;
        _authPendingReturnMessage = '';
        setAuthLoading(false);
      }
    }

    function amountCalcSafeEval(expr) {

    function amountCalcRender() {

      if (disp) disp.textContent = shown.replace(/\*/g, '\u00D7').replace(/\//g, '\u00F7');

    function amountCalcPress(val) {

      const entries = [];

          if (t.wallet === wid) entries.push({ at: t.date, desc: `Transfer \u2192 ${getWlt(t.toWallet).name}${t.note ? ' \u00B7 ' + t.note : ''}`, delta: -t.amount, type: 'expense' });
          if (t.toWallet === wid) entries.push({ at: t.date, desc: `Transfer from ${getWlt(t.wallet).name}${t.note ? ' \u00B7 ' + t.note : ''}`, delta: +t.amount, type: 'income' });

        <div style="font-size:10px;color:var(--text3);margin-top:1px;">${fmt(r.balance)}</div>

        : `<div style="text-align:center;padding:28px 0;color:var(--text3);font-size:13px;">No transactions yet</div>`;

      const reader = new FileReader();

    function handleLpCameraPhoto(input) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        const imgEl = new Image();
        imgEl.onload = function () {
          const MAX = 2.5 * 1024 * 1024;
          let w = imgEl.width, h = imgEl.height;
          const maxDim = 2560;
          if (w > maxDim || h > maxDim) { const r = Math.min(maxDim / w, maxDim / h); w = Math.round(w * r); h = Math.round(h * r); }

          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(imgEl, 0, 0, w, h);
          let quality = 0.88;
          let dataUrl = canvas.toDataURL('image/jpeg', quality);
          while (dataUrl.length * 0.75 > MAX && quality > 0.25) { quality -= 0.08; dataUrl = canvas.toDataURL('image/jpeg', quality); }
          _lpPhoto = dataUrl;
          const prev = document.getElementById('lp-photo-preview');
          const img = document.getElementById('lp-photo-img');

    function normalizeAppNotification(raw = {}) {
      const data = raw.data && typeof raw.data === 'object' ? raw.data : {};
      const note = raw.notification && typeof raw.notification === 'object' ? raw.notification : {};
      const title = repairMojibakeText(cleanUpdateText(raw.title || data.title || note.title || 'nTransactions Message', 'nTransactions Message', 90));
      const message = repairMojibakeText(cleanUpdateText(raw.message || raw.body || data.body || data.message || note.body || 'You have a new nTransactions notification.', '', 360));
      const url = cleanUpdateUrl(raw.url || raw.link || data.url || data.link || '');
      const at = Number(raw.at || raw.timestamp || Date.now());
      const source = repairMojibakeText(cleanUpdateText(raw.source || data.source || 'firebase', 'firebase', 40));
      const rawId = raw.id || data.id || raw.messageId || data.messageId || `${source}_${title}_${message}_${at}`;
      const id = cleanUpdateText(String(rawId), '', 120).replace(/[^\w.-]/g, '_') || ('firebase_' + at);
      return { id, title, message, url, at, source, read: !!raw.read };
    }

    function appNotificationState(item) {
      return {
        kind: 'message',
        platform: item.source || (isAndroidRuntime() ? 'android' : 'web'),
        release: {
          platform: item.source || 'firebase',
          announcementId: item.id,
          latestVersion: APP_WEB_VERSION,

        serviceWorker: false,
        forceUpdate: false,
        announcementId: item.id,
        checkedAt: item.at || Date.now()
      };
    }

    function rememberAppNotification(raw, opts = {}) {
      const item = normalizeAppNotification(raw);
      if (!item.title && !item.message) return null;
      const existing = appNotifications().find(n => n.id === item.id);
      const list = appNotifications().filter(n => n.id !== item.id);
      list.unshift({ ...item, read: existing ? !!existing.read : !!item.read });

      updateNotificationBadge();

      if (diff < 60 * 1000) return 'Now';

      if (diff < 24 * 60 * 60 * 1000) return Math.floor(diff / 3600000) + 'h';
      return Math.floor(diff / 86400000) + 'd';
    }

    function smsPendingCombined() {
      const firebaseNativeKeys = new Set(_smsPendingFirebase.map(p => p.nativeKey).filter(Boolean));
      return [..._smsPendingFirebase, ..._smsPendingNative.filter(p => !firebaseNativeKeys.has(p.nativeKey || p._key))]
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    }

    function refreshNativeSmsPending() {
      try {
        if (!window.NativeApp || typeof window.NativeApp.getPendingSms !== 'function') return;
        const raw = window.NativeApp.getPendingSms();
        const parsed = raw ? JSON.parse(raw) : [];
        _smsPendingNative = Array.isArray(parsed)
          ? parsed.map((v, i) => ({ _key: v._key || v.nativeKey || ('native_' + i), nativeKey: v.nativeKey || v._key, _native: true, ...v }))
          : [];
        _smsPending = smsPendingCombined();
        updateSmsBadge();
      } catch (e) { }
    }

    async function removePendingSmsSource(p) {
      if (!p) return;
      const nativeKey = p.nativeKey || (p._native ? p._key : '');
      if (nativeKey && window.NativeApp && typeof window.NativeApp.removePendingSms === 'function') {
        try { window.NativeApp.removePendingSms(nativeKey); } catch (e) { }
        _smsPendingNative = _smsPendingNative.filter(x => (x.nativeKey || x._key) !== nativeKey);
      }
      if (!p._native && fbUser && p._key) {
        try { await fbDb.ref('users/' + fbUser.uid + '/sms_pending/' + p._key).remove(); } catch (e) { }
        _smsPendingFirebase = _smsPendingFirebase.filter(x => x._key !== p._key);
      } else if (p._native && fbUser && nativeKey) {
        try {
          const snap = await fbDb.ref('users/' + fbUser.uid + '/sms_pending').orderByChild('nativeKey').equalTo(nativeKey).get();
          snap.forEach(child => child.ref.remove());
        } catch (e) { }
      }
      _smsPending = smsPendingCombined();
    }

    function startSmsPendingListener() {
      if (!fbUser) return;
      refreshNativeSmsPending();
      if (_smsPendingListener) return;
      // Path matches Android app: /users/{uid}/sms_pending/
      const ref = fbDb.ref('users/' + fbUser.uid + '/sms_pending');
      _smsPendingListener = ref.on('value', snap => {
        const data = snap.val();
        _smsPendingFirebase = data ? Object.entries(data)
          .map(([k, v]) => ({ _key: k, ...v }))
          .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
          : [];
        _smsPending = smsPendingCombined();
        updateSmsBadge();
      });
    }
    function stopSmsPendingListener() {
      if (_smsPendingListener && fbUser) {
        fbDb.ref('users/' + fbUser.uid + '/sms_pending').off('value', _smsPendingListener);
        _smsPendingListener = null;

    let _backTrapActive = false;

    function ensureBackTrap() {
      if (!_backTrapActive) {
        history.pushState({ trap: true }, '');
        _backTrapActive = true;
      }
    }
    window.addEventListener('popstate', (e) => {
      _backTrapActive = false;
      let handled = false;
      const dtp = document.getElementById('dtpicker-overlay');
      const mod = document.getElementById('modal-overlay');
      const pp = document.getElementById('pp-overlay');
      if (dtp && dtp.classList.contains('open')) { closeDTP(); handled = true; }

      else if (pp && pp.classList.contains('open')) { document.getElementById('pp-overlay').classList.remove('open'); handled = true; }
      else if (S.view !== 'dashboard') { go('dashboard'); handled = true; }

      if (handled) {
        ensureBackTrap();
      } else {
        const now = Date.now();
        if (now - _lastBackPress < 2000) {
          // Double press -> exits app naturally
        } else {
          _lastBackPress = now;
          ensureBackTrap();
          showToast("Press back again to exit");
        }

    function currentAppVersionInfo() {
      const android = isAndroidRuntime();
      const platform = android ? 'android' : 'web';
      const cfg = currentAppReleaseConfig();
      const noticeRelease = _lastUpdateNotice && _lastUpdateNotice.release ? _lastUpdateNotice.release : {};
      const fallbackVersion = android ? getAndroidInstalledVersion() : APP_WEB_VERSION;
      const configuredVersion = cleanUpdateText(cfg.latestVersion || noticeRelease.latestVersion || fallbackVersion, fallbackVersion, 32);

        status: 'Stable Build',
        updated: updated ? `Updated ${updated}` : ''
      };

        return _lastUpdateNotice.hasUpdate ? `Update available: v${esc(_lastUpdateNotice.release.latestVersion)}` : `What's new in v${esc(_lastUpdateNotice.release.latestVersion)}`;
      }

    }

      try {
        return !!(window.__isAndroidApp || window._pwaInNativeApp || (window.NativeApp && typeof window.NativeApp.isAndroidApp === 'function' && window.NativeApp.isAndroidApp()));

    function updateStorageGet(key) {

    }

    function updateStorageSet(key, value) {
      try { localStorage.setItem(key, String(value)); } catch (e) { }
    }

    function updateStorageNum(key) {
      const n = Number(updateStorageGet(key));
      return Number.isFinite(n) ? n : 0;
    }

    function cleanUpdateText(value, fallback = '', max = 240) {
      const str = String(value === undefined || value === null ? fallback : value).trim();
      return str.slice(0, max);
    }

    function cleanUpdateUrl(value) {
      const url = cleanUpdateText(value, '', 900);
      if (!url) return '';
      try {
        const parsed = new URL(url, location.origin);
        if (parsed.protocol === 'https:' || parsed.protocol === 'http:') return parsed.href;
      } catch (e) { }
      return '';
    }

    function parseUpdateList(value) {
      if (Array.isArray(value)) return value;
      if (typeof value !== 'string') return [];
      const str = value.trim();
      if (!str) return [];
      try {
        const parsed = JSON.parse(str);
        if (Array.isArray(parsed)) return parsed;
      } catch (e) { }
      return str.split(/\n|;/).map(x => x.trim()).filter(Boolean);
    }

    function announcementForPlatform(raw, platform) {
      const list = Array.isArray(raw && raw.announcements) ? raw.announcements : [];
      const now = Date.now();
      for (const item of list) {
        if (!item || typeof item !== 'object' || item.active === false) continue;
        const platformsRaw = Array.isArray(item.platforms) ? item.platforms : String(item.platform || item.platforms || 'all').split(',');
        const platforms = platformsRaw.map(x => String(x).trim().toLowerCase()).filter(Boolean);
        if (platforms.length && !platforms.includes('all') && !platforms.includes(platform)) continue;
        const startsAt = item.startsAt || item.startDate || '';
        const endsAt = item.endsAt || item.endDate || '';
        if (startsAt && !Number.isNaN(Date.parse(startsAt)) && Date.parse(startsAt) > now) continue;
        if (endsAt && !Number.isNaN(Date.parse(endsAt)) && Date.parse(endsAt) < now) continue;
        const version = cleanUpdateText(item.version || item.latestVersion || (platform === 'android' ? getAndroidInstalledVersion() : APP_WEB_VERSION), '', 32);
        const id = cleanUpdateText(item.id || `${platform}_${version}_${item.title || 'announcement'}`, '', 80).replace(/[^\w.-]/g, '_');
        const changes = parseUpdateList(item.changelog || item.changes);
        return {
          platform,
          announcementId: id,
          latestVersion: version || (platform === 'android' ? getAndroidInstalledVersion() : APP_WEB_VERSION),
          minimumVersion: '',
          apkUrl: cleanUpdateUrl(item.apkUrl || item.downloadUrl || ''),
          actionUrl: cleanUpdateUrl(item.actionUrl || item.url || item.link || ''),
          releaseDate: cleanUpdateText(item.releaseDate || item.date || '', '', 40),
          forceUpdate: false,
          title: cleanUpdateText(item.title || "What's New in nTransactions", '', 90),
          message: cleanUpdateText(item.message || item.description || '', '', 360),
          changelog: changes.map(x => cleanUpdateText(x, '', 180)).filter(Boolean).slice(0, 8)
        };
      }
      return null;
    }

      const supported = !!('Notification' in window && 'serviceWorker' in navigator && 'PushManager' in window && window.firebase && firebase.messaging);
      const permission = supported ? Notification.permission : 'unsupported';
      const configured = !!webPushVapidKeyFromConfig();
      const token = updateStorageGet('ntx_web_fcm_token');
      const disabled = (!supported || permission === 'denied' || !configured) ? 'disabled' : '';
      const status = !supported
        ? 'Web push is not supported in this browser.'
        : permission === 'denied'
          ? 'Notifications are blocked in browser settings.'
          : token
            ? 'Web push is enabled for this browser.'
            : configured
              ? 'Enable Web Push to receive admin announcements.'
              : 'Add the Firebase Web Push VAPID key in version.json to enable PWA push.';
      return `<div style="border:1px solid var(--border);background:var(--card);border-radius:14px;padding:12px 13px;margin:12px 0;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
          <div><div style="font-size:12px;font-weight:800;color:var(--text);">Notifications & Messages</div><div style="font-size:11px;color:var(--text3);line-height:1.5;margin-top:3px;">${esc(status)}</div></div>
          <button class="btn btn-s" onclick="enableWebPushNotifications()" ${disabled} style="width:auto;min-width:112px;margin:0;padding:9px 12px;">${token ? 'Refresh' : 'Enable'}</button>
        </div>
      </div>`;
    }

    async function firebaseMessagingSupported() {
      if (isAndroidRuntime()) return false;
      if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) return false;
      if (!window.firebase || !firebase.messaging) return false;
      try {
        if (firebase.messaging.isSupported) return await firebase.messaging.isSupported();
      } catch (e) {
        return false;
      }
      return true;
    }

    function bindWebFcmForeground() {
      if (!_webMessaging || _webMessagingBound || typeof _webMessaging.onMessage !== 'function') return;
      _webMessagingBound = true;
      _webMessaging.onMessage(payload => {
        showFcmAnnouncement(payload || {});
      });
    }

    async function syncWebFcmTokenToUser() {
      return;
    }

    async function enableWebPushNotifications(opts = {}) {
      return showDemoUpgrade('smart_tools');
    }

    function showFcmAnnouncement(payload) {
      const data = payload.data || {};
      const note = payload.notification || {};
      const title = cleanUpdateText(data.title || note.title || 'nTransactions Message', '', 90);
      const message = cleanUpdateText(data.body || data.message || note.body || 'You have a new nTransactions announcement.', '', 360);
      const version = cleanUpdateText(data.version || data.latestVersion || APP_WEB_VERSION, '', 32) || APP_WEB_VERSION;
      const announcementId = cleanUpdateText(data.id || payload.messageId || `${version}_${title}`, '', 80).replace(/[^\w.-]/g, '_');
      const item = rememberAppNotification({
        id: announcementId,
        title,
        message,
        url: data.url || data.link || '',
        at: Date.now(),
        source: 'web_fcm'
      });
      const state = {
        kind: 'message',
        platform: 'web',
        release: {
          platform: 'web',
          announcementId,
          latestVersion: version,
          minimumVersion: '',
          apkUrl: '',
          actionUrl: cleanUpdateUrl(data.url || data.link || ''),
          releaseDate: cleanUpdateText(data.releaseDate || data.date || '', '', 40),
          forceUpdate: false,
          title,
          message,
          changelog: parseUpdateList(data.changelog || data.changes).map(x => cleanUpdateText(x, '', 180)).filter(Boolean).slice(0, 8)
        },
        current: APP_WEB_VERSION,
        hasUpdate: false,
        hasAnnouncement: true,
        serviceWorker: false,
        forceUpdate: false,
        announcementId,
        checkedAt: Date.now()
      };
      _lastUpdateNotice = state;
      if (item) updateNotificationBadge();
      showUpdateBanner(state);
    }

    function openFcmNotificationDb() {
      return new Promise((resolve, reject) => {
        if (!('indexedDB' in window)) return reject(new Error('indexeddb_unavailable'));
        const req = indexedDB.open(FCM_DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(FCM_DB_STORE)) {
            db.createObjectStore(FCM_DB_STORE, { keyPath: 'id' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error('indexeddb_open_failed'));
      });
    }

    async function importStoredServiceWorkerNotifications() {
      if (!('indexedDB' in window)) return;
      try {
        const db = await openFcmNotificationDb();
        const list = await new Promise((resolve, reject) => {
          const tx = db.transaction(FCM_DB_STORE, 'readonly');
          const req = tx.objectStore(FCM_DB_STORE).getAll();
          req.onsuccess = () => resolve(Array.isArray(req.result) ? req.result : []);
          req.onerror = () => reject(req.error || new Error('indexeddb_read_failed'));
        });
        list.forEach(item => rememberAppNotification({ ...item, source: item.source || 'web_fcm' }));
        updateNotificationBadge();
        db.close();
      } catch (e) { }
    }

    function importNativeAppNotifications() {
      try {
        if (!window.NativeApp || typeof window.NativeApp.getAppNotifications !== 'function') return;
        const raw = window.NativeApp.getAppNotifications();
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return;
        parsed.forEach(item => rememberAppNotification({ ...item, source: item.source || 'android_fcm' }));
        updateNotificationBadge();
      } catch (e) { }
    }

    function bindServiceWorkerNotificationMessages() {
      if (!('serviceWorker' in navigator) || window.__ntxSwNotificationBound) return;
      window.__ntxSwNotificationBound = true;
      navigator.serviceWorker.addEventListener('message', event => {
        const data = event.data || {};
        if (data.type !== 'NTX_FCM_NOTIFICATION' || !data.notification) return;
        rememberAppNotification({ ...data.notification, source: data.notification.source || 'web_fcm' }, { banner: !document.hidden });
      });
    }

    function compareVersions(a, b) {
      const pa = String(a || '0').split(/[^\d]+/).filter(Boolean).map(Number);
      const pb = String(b || '0').split(/[^\d]+/).filter(Boolean).map(Number);
      const len = Math.max(pa.length, pb.length, 3);
      for (let i = 0; i < len; i++) {
        const da = Number.isFinite(pa[i]) ? pa[i] : 0;
        const db = Number.isFinite(pb[i]) ? pb[i] : 0;
        if (da > db) return 1;
        if (da < db) return -1;
      }
      return 0;
    }

    function releaseForPlatform(raw, platform) {
      if (!raw || typeof raw !== 'object') return null;
      const nested = platform === 'android'
        ? (raw.android || raw.apk || raw.mobile)
        : (raw.web || raw.pwa || raw.browser);
      const source = (nested && typeof nested === 'object') ? { ...raw, ...nested } : raw;
      const latest = cleanUpdateText(source.latestVersion || source.version || '', '', 32);
      if (!latest) return null;
      const changelogRaw = Array.isArray(source.changelog) ? source.changelog : Array.isArray(source.changes) ? source.changes : [];
      return {
        platform,
        latestVersion: latest,
        minimumVersion: cleanUpdateText(source.minimumVersion || source.minVersion || '', '', 32),
        apkUrl: cleanUpdateUrl(source.apkUrl || source.downloadUrl || source.url || ''),
        actionUrl: cleanUpdateUrl(source.actionUrl || source.link || ''),
        releaseDate: cleanUpdateText(source.releaseDate || source.date || '', '', 40),
        forceUpdate: !!source.forceUpdate,
        title: cleanUpdateText(source.title || (platform === 'android' ? 'New APK Update Available' : "What's New in nTransactions"), '', 90),
        message: cleanUpdateText(source.message || source.description || '', '', 360),
        changelog: changelogRaw.map(x => cleanUpdateText(x, '', 180)).filter(Boolean).slice(0, 8)
      };
    }

    async function fetchUpdateConfig() {
      if (typeof fetch !== 'function') return null;
      const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
      const timer = controller ? setTimeout(() => controller.abort(), 5500) : null;
      try {
        const res = await fetch(UPDATE_CONFIG_URL + '?t=' + Date.now(), {
          cache: 'no-store',
          headers: { 'Accept': 'application/json' },
          signal: controller ? controller.signal : undefined
        });
        if (!res || !res.ok) throw new Error('update_config_unavailable');
        const data = await res.json();
        if (!data || typeof data !== 'object') throw new Error('invalid_update_config');
        _lastUpdateConfig = data;
        return data;
      } finally {
        if (timer) clearTimeout(timer);
      }
    }

    function buildUpdateState(config, opts = {}) {
      const platform = isAndroidRuntime() ? 'android' : 'web';
      const release = releaseForPlatform(config, platform);
      if (!release) return null;
      const remoteAnnouncement = announcementForPlatform(config, platform);
      const current = platform === 'android' ? getAndroidInstalledVersion() : APP_WEB_VERSION;
      const hasUpdate = compareVersions(release.latestVersion, current) > 0;
      const belowMinimum = release.minimumVersion ? compareVersions(release.minimumVersion, current) > 0 : false;
      const forceUpdate = !!(release.forceUpdate || belowMinimum);
      const seenKey = `ntx_update_seen_${platform}`;
      const dismissedKey = `ntx_update_dismissed_${platform}`;
      const ignoreKey = `ntx_update_ignore_until_${platform}_${release.latestVersion}`;
      const seenVersion = updateStorageGet(seenKey);
      const dismissedVersion = updateStorageGet(dismissedKey);
      const ignoreUntil = updateStorageNum(ignoreKey);
      const announcementId = remoteAnnouncement ? remoteAnnouncement.announcementId : '';
      const hasRemoteAnnouncement = !!remoteAnnouncement
        && updateStorageGet(`ntx_announcement_seen_${platform}_${announcementId}`) !== '1'
        && updateStorageGet(`ntx_announcement_dismissed_${platform}_${announcementId}`) !== '1';
      const hasVersionAnnouncement = platform === 'web'
        && !hasUpdate
        && release.latestVersion === current
        && seenVersion !== release.latestVersion
        && dismissedVersion !== release.latestVersion;
      const hasAnnouncement = hasRemoteAnnouncement || (platform === 'android' && hasVersionAnnouncement);
      if (hasUpdate && !forceUpdate && !opts.manual && ignoreUntil > Date.now()) return null;
      if (platform === 'web' && !hasRemoteAnnouncement) return null;
      if (!hasUpdate && !hasAnnouncement && !(platform === 'android' && _swUpdateAvailable)) return null;
      return {
        platform,
        release: hasRemoteAnnouncement && !hasUpdate ? remoteAnnouncement : release,
        current,
        hasUpdate,
        hasAnnouncement,
        serviceWorker: false,
        forceUpdate,
        announcementId: hasRemoteAnnouncement && !hasUpdate ? announcementId : '',
        checkedAt: Date.now()
      };
    }

    function currentUpdateState() {
      const platform = isAndroidRuntime() ? 'android' : 'web';
      return {
        platform,
        release: {
          platform,
          latestVersion: platform === 'android' ? getAndroidInstalledVersion() : APP_WEB_VERSION,
          minimumVersion: '',
          apkUrl: '',
          releaseDate: '',
          forceUpdate: false,
          title: platform === 'android' ? 'Android APK is up to date' : 'PWA is up to date',
          message: 'No newer release announcement was found.',
          changelog: []
        },
        current: platform === 'android' ? getAndroidInstalledVersion() : APP_WEB_VERSION,
        hasUpdate: false,
        hasAnnouncement: false,
        serviceWorker: false,
        forceUpdate: false,
        checkedAt: Date.now()
      };
    }

    async function checkForUpdates(opts = {}) {
      const manual = !!opts.manual;
      const now = Date.now();
      if (!manual && !opts.force && now - updateStorageNum('ntx_update_last_check') < UPDATE_CHECK_INTERVAL_MS) return _lastUpdateNotice;
      updateStorageSet('ntx_update_last_check', now);
      try {
        const config = await fetchUpdateConfig();
        const state = buildUpdateState(config, opts);
        _lastUpdateNotice = state || currentUpdateState();
        if (state && opts.openUI !== false) {
          showUpdateBanner(state);
          if (state.forceUpdate) openUpdateModal(state);
          maybeShowNativeUpdateNotification(state);
        } else if (!state && manual && opts.toast !== false) {
          hideUpdateBanner();
          showToast('nTransactions is up to date');
        }
        return state || currentUpdateState();
      } catch (e) {
        if (manual && opts.toast !== false) showToast('Update check failed. Try again later.');
        return null;
      }
    }

    function updateIconSvg(size = 17, color = 'currentColor') {
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-15.4 6.4"/><path d="M3 12A9 9 0 0 1 18.4 5.6"/><path d="M18 2v5h-5"/><path d="M6 22v-5h5"/></svg>`;
    }

    function showUpdateBanner(state) {
      if (!state || !state.release) return;
      _lastUpdateNotice = state;
      if (state.kind !== 'message') rememberAdminNotification(state);
      const el = document.getElementById('update-banner');
      if (!el) return;
      const action = state.release.actionUrl && !state.hasUpdate ? 'Open' : state.platform === 'android' && state.hasUpdate && state.release.apkUrl ? 'Download' : state.serviceWorker || state.hasUpdate ? 'View' : 'What\'s New';
      const title = state.hasUpdate
        ? `${state.platform === 'android' ? 'APK' : 'App'} update v${esc(state.release.latestVersion)}`
        : state.serviceWorker ? '' : esc(state.release.title || `What's new in v${state.release.latestVersion}`);
      if (!title) return;
      const msg = state.release.message || (state.platform === 'android' ? 'A newer Android APK is available.' : 'Review the latest improvements.');
      el.innerHTML = `<div class="update-banner-icon">${updateIconSvg()}</div>
        <div class="update-banner-body"><div class="update-banner-title">${title}</div><div class="update-banner-msg">${esc(msg)}</div></div>
        <div class="update-banner-actions">
          <button class="update-mini-btn primary" onclick="${state.platform === 'android' && state.hasUpdate && state.release.apkUrl ? 'downloadAndroidUpdate()' : 'openUpdateModal()'}">${action}</button>
          ${state.forceUpdate ? '' : `<button class="update-mini-btn" onclick="dismissUpdateNotice()">Later</button>`}
        </div>`;
      requestAnimationFrame(() => el.classList.add('show'));
    }

    function hideUpdateBanner() {
      const el = document.getElementById('update-banner');
      if (el) el.classList.remove('show');
    }

    function dismissUpdateNotice(markSeen = false) {
      const state = _lastUpdateNotice;
      if (state && state.release) {
        if (state.announcementId) {
          updateStorageSet(`ntx_announcement_seen_${state.platform}_${state.announcementId}`, '1');
          updateStorageSet(`ntx_announcement_dismissed_${state.platform}_${state.announcementId}`, '1');
        }
        if (markSeen || state.hasAnnouncement) {
          updateStorageSet(`ntx_update_seen_${state.platform}`, state.release.latestVersion);
          updateStorageSet(`ntx_update_dismissed_${state.platform}`, state.release.latestVersion);
        } else if (!state.forceUpdate) {
          updateStorageSet(`ntx_update_ignore_until_${state.platform}_${state.release.latestVersion}`, Date.now() + 24 * 60 * 60 * 1000);
        }
      }
      hideUpdateBanner();
    }

    function updateChangelogHTML(release) {
      if (!release || !release.changelog || !release.changelog.length) {
        return '<div style="font-size:12px;color:var(--text3);line-height:1.6;margin-top:12px;">No changelog details were provided for this release.</div>';
      }
      return `<div class="update-change-list">${release.changelog.map(item => `<div class="update-change-item">${esc(item)}</div>`).join('')}</div>`;
    }

    function openUpdateModal(state = _lastUpdateNotice) {
      state = state || currentUpdateState();
      const r = state.release;
      const isAndroid = state.platform === 'android';
      const isMessage = state.kind === 'message';
      const primary = r.actionUrl && !state.hasUpdate && !state.serviceWorker
        ? `<button class="btn btn-p" onclick="openUpdateActionUrl()">${r.actionUrl === OFFICIAL_DOWNLOAD_URL ? 'Open Download Page' : 'Open Details'}</button>`
        : isAndroid && state.hasUpdate && r.apkUrl
        ? `<button class="btn btn-p" onclick="downloadAndroidUpdate()">Download APK</button>`
        : state.platform === 'web' && (state.hasUpdate || state.serviceWorker)
          ? `<button class="btn btn-p" onclick="reloadForUpdate()">Reload Now</button>`
          : `<button class="btn btn-p" onclick="dismissUpdateNotice(true);closeModal();">Got It</button>`;
      const secondary = state.forceUpdate ? '' : `<button class="btn btn-s" onclick="dismissUpdateNotice(${state.hasAnnouncement ? 'true' : 'false'});closeModal();" style="margin-top:8px;">${state.hasUpdate ? 'Remind Me Later' : 'Close'}</button>`;
      const apkMissing = isAndroid && state.hasUpdate && !r.apkUrl
        ? `<div style="background:var(--amber-d);border:1px solid rgba(255,176,32,.25);border-radius:12px;padding:11px 13px;margin:12px 0;color:var(--amber);font-size:12px;line-height:1.6;">A newer APK is listed, but no APK download URL is configured yet.</div>`
        : '';
      openModal(`<div class="modal-title">${esc(r.title || 'App Update')}</div>
        <div class="update-card">
          <div class="update-card-kicker">${isMessage ? 'Firebase Message' : `${isAndroid ? 'Android APK' : 'PWA WebApp'} ${state.forceUpdate ? 'Required Update' : state.hasUpdate ? 'Update Available' : 'Release Notes'}`}</div>
          <div class="update-card-title">${isMessage ? esc(r.title || 'Notification') : 'Version ' + esc(r.latestVersion)}</div>
          ${isMessage ? '' : `<div style="font-size:11px;color:var(--text3);margin-top:6px;">Current version: ${esc(state.current)}${r.releaseDate ? ' &middot; Released ' + esc(r.releaseDate) : ''}</div>`}
          <div class="update-card-msg">${esc(r.message || (state.hasUpdate ? 'A newer version is available.' : 'You are using the latest version.'))}</div>
          ${isMessage ? '' : updateChangelogHTML(r)}
        </div>
        ${apkMissing}
        ${primary}
        ${secondary}
        ${!state.forceUpdate && !isMessage ? `<button class="btn btn-s" onclick="checkForUpdates({manual:true})" style="margin-top:8px;">Check Again</button>` : ''}`);
    }

    async function openUpdateCenter() {
      openModal(`<div class="modal-title">App Updates</div>
        <div class="update-card"><div class="update-card-kicker">Checking</div><div class="update-card-title">Looking for updates</div><div class="update-card-msg">Checking the lightweight release file.</div></div>`);
      const state = await checkForUpdates({ manual: true, openUI: false, toast: false });
      openUpdateModal(state || currentUpdateState());
    }

    function openUpdateActionUrl() {
      const state = _lastUpdateNotice;
      const url = state && state.release ? state.release.actionUrl : '';
      if (!url) return showToast('No detail link is configured');
      try {
        window.open(url, '_blank', 'noopener');
      } catch (e) {
        location.href = url;
      }
    }

    function downloadAndroidUpdate() {
      const state = _lastUpdateNotice;
      const url = state && state.release ? state.release.apkUrl : '';
      if (!url) return showToast('APK download URL is not configured yet');
      try {
        if (window.NativeApp && typeof window.NativeApp.openExternalUrl === 'function') {
          window.NativeApp.openExternalUrl(url);
        } else {
          window.open(url, '_blank', 'noopener');
        }
      } catch (e) {
        location.href = url;
      }
    }

    function reloadForUpdate() {
      dismissUpdateNotice(false);
      if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        try { navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' }); } catch (e) { }
      }
      setTimeout(() => location.reload(), 150);
    }

    function maybeShowNativeUpdateNotification(state) {
      if (!state || state.platform !== 'android' || !state.hasUpdate || !state.release || !state.release.apkUrl) return;
      const key = `ntx_update_native_notified_${state.release.latestVersion}`;
      if (updateStorageGet(key)) return;
      try {
        if (window.NativeApp && typeof window.NativeApp.showUpdateNotification === 'function') {
          window.NativeApp.showUpdateNotification(state.release.title || 'nTransactions Update', state.release.message || 'A new APK version is available.', state.release.apkUrl);
          updateStorageSet(key, '1');
        }
      } catch (e) { }
    }

    function onServiceWorkerUpdateReady() {
      if (_swControllerHandled) return;
      _swControllerHandled = true;
      _swUpdateAvailable = true;
      console.info('nTransactions service worker update is ready; PWA update prompt suppressed.');
    }

    function watchServiceWorkerRegistration(reg) {
      if (!reg) return;
      reg.addEventListener('updatefound', () => {
        const worker = reg.installing;
        if (!worker) return;
        worker.addEventListener('statechange', () => {
          if (worker.state === 'installed' && navigator.serviceWorker.controller) onServiceWorkerUpdateReady();
        });
      });
    }

    async function registerServiceWorkerForUpdates() {
      try {
        bindServiceWorkerNotificationMessages();
        const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
        watchServiceWorkerRegistration(reg);
        importStoredServiceWorkerNotifications();
        if (reg.waiting && navigator.serviceWorker.controller) onServiceWorkerUpdateReady();
        reg.update().catch(() => { });
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (navigator.serviceWorker.controller) onServiceWorkerUpdateReady();
        });
      } catch (e) { }
    }

    function showPwaAndroidDownloadNotice() {
      if (isAndroidRuntime()) return;
      if (location.pathname.replace(/\/+$/, '').endsWith('/download')) return;
      const key = 'ntx_pwa_android_download_notice_seen';
      if (updateStorageGet(key)) return;
      updateStorageSet(key, '1');
      const state = {
        platform: 'web',
        release: {
          platform: 'web',
          announcementId: 'stable_android_app_available',
          latestVersion: APP_WEB_VERSION,
          minimumVersion: '',
          apkUrl: '',
          actionUrl: OFFICIAL_DOWNLOAD_URL,
          releaseDate: '',
          forceUpdate: false,
          title: 'Android app available',
          message: 'A stable nTransactions Android app is available from the official download page.',
          changelog: []
        },
        current: APP_WEB_VERSION,
        hasUpdate: false,
        hasAnnouncement: true,
        serviceWorker: false,
        forceUpdate: false,
        announcementId: 'stable_android_app_available',
        checkedAt: Date.now()
      };
      _lastUpdateNotice = state;
      showUpdateBanner(state);
    }

    function initUpdateAwareness() {
      bindServiceWorkerNotificationMessages();
      importStoredServiceWorkerNotifications();
      importNativeAppNotifications();
      setTimeout(showPwaAndroidDownloadNotice, 900);
      setTimeout(() => checkForUpdates({ force: true }), 1600);
      setTimeout(() => {
        if (!isAndroidRuntime() && 'Notification' in window && Notification.permission === 'granted') {
          enableWebPushNotifications({ silent: true }).catch(() => { });
        }
      }, 2600);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          importStoredServiceWorkerNotifications();
          importNativeAppNotifications();
          checkForUpdates();
        }
      });
      window.addEventListener('online', () => checkForUpdates({ force: true }));
    }

    function showToast(msg) {
      let t = document.getElementById('toast-msg');
      if (!t) {
        t = document.createElement('div');
        t.id = 'toast-msg';
        t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);border:1px solid var(--border);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:700;font-family:"Outfit",sans-serif;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s;box-shadow:0 10px 30px rgba(0,0,0,0.5);';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(window._toastTimeout);
      window._toastTimeout = setTimeout(() => { t.style.opacity = '0'; }, 2000);
    }

    // ============ INIT ============
    function handleSharedAppInit() {
      const urlParams = new URLSearchParams(window.location.search);

          </div>
          <div class="dtp-cwrap">
            <svg class="dtp-csvg" id="dtp-csvg" viewBox="0 0 240 240" onpointerdown="dtpClockPointerDown(event)"></svg>
          </div>
          <div class="dtp-ti">
            <div class="dtp-time-read"><span id="dtp-time-main"><span class="dtp-time-part a"
                  onclick="dtpSetMode('hr')">12</span>:<span class="dtp-time-part"
                  onclick="dtpSetMode('mn')">00</span></span><span class="dtp-time-mode" id="dtp-time-mode">hour</span>
            </div>
            <button class="dtp-kb" onclick="dtpOpenManual()" aria-label="Type time manually" title="Type time manually">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="14" rx="2" />
                <path d="M7 9h.01M11 9h.01M15 9h.01M19 9h.01M7 13h.01M11 13h.01M15 13h.01M8 17h8" />
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="dtp-manual" id="dtp-manual" onclick="if(event.target===this)dtpCloseManual()">
        <div class="dtp-manual-card" onclick="event.stopPropagation()">
          <div class="dtp-manual-title">Set time</div>
          <div class="dtp-manual-body">
            <div class="dtp-manual-label">Type in time</div>
            <div class="dtp-manual-row">
              <div class="dtp-manual-field">
                <input class="dtp-manual-input" id="dtp-manual-hr" type="number" min="1" max="12"
                  onkeydown="dtpManualKey(event)" onfocus="this.select()">
                <div class="dtp-manual-help">hour</div>
              </div>
              <div class="dtp-manual-colon">:</div>
              <div class="dtp-manual-field">
                <input class="dtp-manual-input" id="dtp-manual-mn" type="number" min="0" max="59"
                  onkeydown="dtpManualKey(event)" onfocus="this.select()">
                <div class="dtp-manual-help">minute</div>
              </div>
              <select class="dtp-manual-ap" id="dtp-manual-ap" onkeydown="dtpManualKey(event)">
                <option value="AM">AM</option>
                <option value="PM">PM</option>
              </select>
            </div>
          </div>
          <div class="dtp-manual-actions">
            <button class="dtp-manual-clock" onclick="dtpCloseManual()" aria-label="Return to clock">
              <svg width="29" height="29" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9" />
                <path d="M12 7v5l3 2" />
              </svg>
            </button>
            <button class="dtp-manual-btn" onclick="dtpCloseManual()">Cancel</button>
            <button class="dtp-manual-btn" onclick="dtpManualApply()">OK</button>
          </div>
        </div>
      </div>
      <div class="dtpicker-ftr">
        <button class="dtp-qb" onclick="dtpNow()">Now</button>
        <button class="dtp-qb" onclick="dtpToday()">Today</button>
        <button class="dtp-can" onclick="closeDTP()">Cancel</button>
        <button class="dtp-ok" onclick="dtpConfirm()">OK</button>
      </div>
    </div>
  </div>

</body>

</html>
